<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Analizador de Resultados Académicos</title>

<script src="libs/xlsx.full.min.js"></script>
<script src="libs/chart.umd.min.js"></script>
<script src="libs/FileSaver.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Analizador de resultados académicos</h1>

<div class="panel">

<h2>Archivos Excel</h2>

<label>Año actual</label>
<input type="file" id="year0">

<label>Año anterior</label>
<input type="file" id="year1">

<label>Hace dos años</label>
<input type="file" id="year2">

<h2>Evaluación</h2>

<select id="evaluation">
<option value="W">Primera evaluación</option>
<option value="X">Segunda evaluación</option>
<option value="Z">Ordinaria</option>
<option value="AB">Final (ESO)</option>
<option value="AA">Extraordinaria</option>
</select>

<button onclick="procesar()">Analizar datos</button>

</div>

<div class="panel">

<button onclick="exportarExcel()">Exportar resultados a Excel</button>

</div>

<div id="resultados"></div>

<script src="app.js"></script>
<script src="export.js"></script>

</body>
</html>
