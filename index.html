<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Académico Multianual</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-7xl mx-auto bg-white shadow-xl rounded-lg p-6">
        <h1 class="text-3xl font-bold text-blue-900 mb-4 text-center">📊 Analizador de Resultados LOMLOE</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-blue-50 p-6 rounded-lg border border-blue-200">
            <div>
                <label class="block font-bold mb-2">1. Evaluación a consultar:</label>
                <select id="evalSel" class="w-full p-2 border rounded">
                    <option value="W">1ª Evaluación (Col W)</option>
                    <option value="X">2ª Evaluación (Col X)</option>
                    <option value="FINAL">Ordinaria / Final (Col Z / AB)</option>
                    <option value="AA">Extraordinaria (Col AA)</option>
                </select>
            </div>
            <div>
                <label class="block font-bold mb-2">2. Cargar Excels (Selecciona los 3 archivos a la vez):</label>
                <input type="file" id="fileInput" multiple accept=".xlsx, .xls" class="w-full p-1 bg-white border rounded">
                <p class="text-xs text-gray-500 mt-1 italic">Nota: Los archivos deben llamarse como el curso (ej: 2024-2025.xlsx)</p>
            </div>
        </div>

        <div class="flex justify-end mb-6">
            <button id="btnExport" class="hidden bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow-lg transition-all">
                📥 Exportar Informe Editable (.xlsx)
            </button>
        </div>

        <div id="mainContainer" class="space-y-12"></div>
    </div>

    <script>
        const SECCIONES = [
            { id: "1ESO", nombre: "1º de ESO", niveles: ["1º de ESO"] },
            { id: "2ESO", nombre: "2º de ESO", niveles: ["2º de ESO"] },
            { id: "3ESO", nombre: "3º de ESO", niveles: ["3º de ESO", "1º de Diversificación", "1º Diversificación"] },
            { id: "4ESO", nombre: "4º de ESO", niveles: ["4º de ESO", "2º de Diversificación", "2º Diversificación"] },
            { id: "1FPB", nombre: "1º FP Grado Básico", niveles: ["1º de Formación Profesional de Grado Básico", "1º FPB"] },
            { id: "2FPB", nombre: "2º FP Grado Básico", niveles: ["2º de Formación Profesional de Grado Básico", "2º FPB"] },
            { id: "1BACH", nombre: "1º de Bachillerato", niveles: ["1º de Bachillerato"] },
            { id: "2BACH", nombre: "2º de Bachillerato", niveles: ["2º de Bachillerato"] }
        ];

        let datosAnuales = {}; // Estructura: { "2024-2025": { secciones... } }
        let charts = [];

        document.getElementById('fileInput').addEventListener('change', procesarArchivos);
        document.getElementById('btnExport').addEventListener('click', exportarInforme);

        async function procesarArchivos(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            datosAnuales = {};
            const evalTipo = document.getElementById('evalSel').value;

            for (const file of files) {
                const nombreCurso = file.name.replace(/\.[^/.]+$/, "");
                const data = await leerExcel(file);
                datosAnuales[nombreCurso] = analizarDatos(data, evalTipo);
            }

            renderizarInterfaz();
            document.getElementById('btnExport').classList.remove('hidden');
        }

        function leerExcel(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(e.target.result, { type: 'binary' });
                    resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: "A" }));
                };
                reader.readAsBinaryString(file);
            });
        }

        function analizarDatos(rows, evalTipo) {
            const alumnos = {};
            // Agrupar materias por alumno
            rows.forEach((r, i) => {
                if (i < 1 || !r.E) return;
                const id = `${r.E}_${r.F}_${r.G}`;
                const grupo = r.N;
                const etapa = r.K; // Aquí se espera el nivel académico

                let notaRaw = (evalTipo === 'FINAL') ? (r.AB || r.Z) : r[evalTipo];
                let nota = parseFloat(String(notaRaw).replace(',', '.'));

                if (!alumnos[id]) {
                    alumnos[id] = { grupo, etapa, suspensos: 0 };
                }
                if (!isNaN(nota) && nota < 5) alumnos[id].suspensos++;
            });

            // Agrupar por Secciones (Lógica de Diversificación incluida)
            const resultados = {};
            SECCIONES.forEach(s => {
                resultados[s.id] = { nombre: s.nombre, grupos: {}, total: { r0:0, r12:0, r34:0, r5p:0, t:0 } };
            });

            Object.values(alumnos).forEach(a => {
                const seccion = SECCIONES.find(s => s.niveles.some(n => a.etapa && a.etapa.includes(n)));
                if (seccion) {
                    const sData = resultados[seccion.id];
                    if (!sData.grupos[a.grupo]) sData.grupos[a.grupo] = { r0:0, r12:0, r34:0, r5p:0, t:0 };
                    
                    const g = sData.grupos[a.grupo];
                    const t = sData.total;

                    const categoria = a.suspensos === 0 ? 'r0' : a.suspensos <= 2 ? 'r12' : a.suspensos <= 4 ? 'r34' : 'r5p';
                    
                    g[categoria]++; g.t++;
                    t[categoria]++; t.t++;
                }
            });
            return resultados;
        }

        function renderizarInterfaz() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "";
            charts.forEach(c => c.destroy());
            charts = [];

            const cursoActual = Object.keys(datosAnuales).sort().reverse()[0];
            const cursosAnteriores = Object.keys(datosAnuales).sort().reverse().slice(1);

            SECCIONES.forEach(sec => {
                const dataActual = datosAnuales[cursoActual][sec.id];
                if (dataActual.total.t === 0) return;

                const sectionEl = document.createElement('section');
                sectionEl.className = "bg-white border-2 border-gray-200 rounded-xl p-6 shadow-sm";
                
                // Título Sección
                sectionEl.innerHTML = `<h2 class="text-2xl font-black text-blue-800 border-b-4 border-blue-200 pb-2 mb-6 uppercase">${sec.nombre}</h2>`;

                // 1. Tabla por Grupos
                let tablaGrupos = `<div class="mb-8 overflow-x-auto"><table class="w-full text-sm border text-center">
                    <tr class="bg-gray-800 text-white font-bold text-xs uppercase">
                        <th class="p-2 text-left">Grupo</th><th>0 Susp</th><th>1-2 Susp</th><th>3-4 Susp</th><th>5+ Susp</th><th class="bg-gray-700">Total</th>
                    </tr>`;
                
                Object.entries(dataActual.grupos).forEach(([num, g]) => {
                    tablaGrupos += `<tr>
                        <td class="p-2 font-bold bg-gray-50 text-left">${num}</td>
                        <td>${g.r0} <br><span class="text-blue-600 text-[10px]">${(g.r0/g.t*100).toFixed(1)}%</span></td>
                        <td>${g.r12} <br><span class="text-blue-600 text-[10px]">${(g.r12/g.t*100).toFixed(1)}%</span></td>
                        <td>${g.r34} <br><span class="text-blue-600 text-[10px]">${(g.r34/g.t*100).toFixed(1)}%</span></td>
                        <td>${g.r5p} <br><span class="text-blue-600 text-[10px]">${(g.r5p/g.t*100).toFixed(1)}%</span></td>
                        <td class="font-bold bg-gray-50">${g.t}</td>
                    </tr>`;
                });
                tablaGrupos += `</table></div>`;
                sectionEl.innerHTML += tablaGrupos;

                // 2. Gráfica Comparativa Grupos
                const canvasId = `chart-${sec.id}`;
                sectionEl.innerHTML += `<div class="h-64 mb-10"><canvas id="${canvasId}"></canvas></div>`;

                // 3. Comparativa Histórica
                let histHtml = `<div class="bg-blue-50 p-4 rounded-lg"><h4 class="font-bold mb-3 text-blue-900 uppercase text-xs tracking-widest">Comparativa Histórica del Nivel</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">`;
                
                Object.keys(datosAnuales).sort().forEach(curso => {
                    const d = datosAnuales[curso][sec.id].total;
                    histHtml += `<div class="bg-white p-3 rounded border shadow-sm ${curso === cursoActual ? 'ring-2 ring-blue-400' : ''}">
                        <p class="font-black text-center border-b mb-2 text-gray-700">${curso}</p>
                        <div class="text-[11px] space-y-1">
                            <div class="flex justify-between"><span>0 Susp:</span><b>${(d.r0/d.t*100 || 0).toFixed(1)}%</b></div>
                            <div class="flex justify-between"><span>1-2 Susp:</span><b>${(d.r12/d.t*100 || 0).toFixed(1)}%</b></div>
                            <div class="flex justify-between"><span>3-4 Susp:</span><b>${(d.r34/d.t*100 || 0).toFixed(1)}%</b></div>
                            <div class="flex justify-between"><span>5+ Susp:</span><b>${(d.r5p/d.t*100 || 0).toFixed(1)}%</b></div>
                            <div class="flex justify-between border-t mt-1 pt-1 font-bold"><span>Total Alumn:</span><span>${d.t}</span></div>
                        </div>
                    </div>`;
                });
                histHtml += `</div></div>`;
                sectionEl.innerHTML += histHtml;

                container.appendChild(sectionEl);
                setTimeout(() => crearGrafica(canvasId, dataActual.grupos), 100);
            });
        }

        function crearGrafica(id, grupos) {
            const ctx = document.getElementById(id).getContext('2d');
            const labels = Object.keys(grupos);
            const datasets = [
                { label: '0 Susp', data: labels.map(l => (grupos[l].r0/grupos[l].t*100).toFixed(1)), backgroundColor: '#22c55e' },
                { label: '1-2 Susp', data: labels.map(l => (grupos[l].r12/grupos[l].t*100).toFixed(1)), backgroundColor: '#eab308' },
                { label: '3-4 Susp', data: labels.map(l => (grupos[l].r34/grupos[l].t*100).toFixed(1)), backgroundColor: '#f97316' },
                { label: '5+ Susp', data: labels.map(l => (grupos[l].r5p/grupos[l].t*100).toFixed(1)), backgroundColor: '#ef4444' }
            ];

            const c = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { x: { stacked: true }, y: { stacked: true, max: 100 } },
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } }
                }
            });
            charts.push(c);
        }

        function exportarInforme() {
            const wb = XLSX.utils.book_new();
            Object.entries(datosAnuales).forEach(([curso, secciones]) => {
                const rows = [];
                Object.values(secciones).forEach(s => {
                    if (s.total.t === 0) return;
                    rows.push({ "Sección": s.nombre, "Grupo": "TOTAL NIVEL", "0 Susp %": (s.total.r0/s.total.t*100).toFixed(1), "1-2 %": (s.total.r12/s.total.t*100).toFixed(1), "3-4 %": (s.total.r34/s.total.t*100).toFixed(1), "5+ %": (s.total.r5p/s.total.t*100).toFixed(1), "Alumnos": s.total.t });
                    Object.entries(s.grupos).forEach(([n, g]) => {
                        rows.push({ "Sección": s.nombre, "Grupo": n, "0 Susp %": (g.r0/g.t*100).toFixed(1), "1-2 %": (g.r12/g.t*100).toFixed(1), "3-4 %": (g.r34/g.t*100).toFixed(1), "5+ %": (g.r5p/g.t*100).toFixed(1), "Alumnos": g.t });
                    });
                });
                const ws = XLSX.utils.json_to_sheet(rows);
                XLSX.utils.book_append_sheet(wb, ws, curso);
            });
            XLSX.writeFile(wb, `Informe_Editable_Academico.xlsx`);
        }
    </script>
</body>
</html>
