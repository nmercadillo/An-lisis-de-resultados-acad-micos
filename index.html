<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Académico - Jefatura de Estudios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-4">

    <div class="max-w-6xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-t-xl shadow-lg">
            <h1 class="text-2xl font-bold italic">Análisis de resultados</h1>
            <p class="text-sm opacity-80">Generador de informes comparativos para Jefatura</p>
        </header>

        <div class="bg-white p-6 rounded-b-xl shadow-md mb-6 border-x border-b">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Evaluación</label>
                    <select id="evalSelect" class="w-full border p-2 rounded bg-gray-50">
                        <option value="W">1ª Evaluación</option>
                        <option value="X">2ª Evaluación</option>
                        <option value="Z_AB">Ordinaria / Final (Unificada)</option>
                        <option value="AA">Extraordinaria</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Archivos Excel (Varios para comparar)</label>
                    <input type="file" id="fileInput" accept=".xlsx, .xls" multiple class="w-full text-sm border p-1 rounded">
                </div>
                <div>
                    <button onclick="startAnalysis()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition shadow-md">
                        🚀 GENERAR INFORME
                    </button>
                </div>
                <div>
                    <button id="btnExport" onclick="exportToExcel()" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition shadow-md opacity-50 cursor-not-allowed">
                        📥 EXPORTAR EXCEL EDITABLE
                    </button>
                </div>
            </div>
            <p id="statusMsg" class="mt-3 text-sm text-blue-600 font-medium"></p>
        </div>

        <div id="resultsContainer" class="space-y-10"></div>
    </div>

    <script>
        const NIVELES_ORDEN = [
            "1º ESO", "2º ESO", "3º ESO (Incl. 1º DIV)", "4º ESO (Incl. 2º DIV)",
            "1º Bachillerato", "2º Bachillerato",
            "1º FP Básica (SC)", "2º FP Básica (SC)"
        ];

        let globalReportData = []; // Guarda los datos procesados para poder exportarlos después

        async function startAnalysis() {
            const files = document.getElementById('fileInput').files;
            const evalType = document.getElementById('evalSelect').value;
            const container = document.getElementById('resultsContainer');
            const status = document.getElementById('statusMsg');
            const btnExport = document.getElementById('btnExport');

            if (files.length === 0) {
                alert("Por favor, selecciona al menos un archivo Excel.");
                return;
            }

            container.innerHTML = "<p class='text-center p-10'>Procesando datos...</p>";
            status.innerText = "Leyendo archivos...";
            btnExport.disabled = true;
            btnExport.classList.add('opacity-50', 'cursor-not-allowed');

            globalReportData = [];

            for (let file of files) {
                try {
                    const workbook = await readExcel(file);
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, {header: "A"});
                    const processed = processData(json, evalType, file.name.split('.')[0]);
                    globalReportData.push(processed);
                } catch (err) {
                    console.error("Error leyendo " + file.name, err);
                }
            }

            status.innerText = "Generando gráficas y tablas...";
            render(globalReportData);
            status.innerText = "Informe generado con éxito.";
            
            // Activar botón de exportar
            btnExport.disabled = false;
            btnExport.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function readExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}));
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function processData(rows, evalType, fileName) {
            let store = { curso: fileName, niveles: {} };

            rows.forEach((row, i) => {
                if (i < 1 || !row.N) return; // Saltamos cabecera y filas vacías

                const unidad = String(row.N).toUpperCase();
                const etapa = String(row.K || "").toUpperCase();
                const nivel = detectarNivel(etapa, unidad);
                if (nivel === "OTROS") return;

                let nota;
                
                // --- LÓGICA DE UNIFICACIÓN PARA FINAL / ORDINARIA ---
                if (evalType === "Z_AB") {
                    if (nivel.includes("Bachillerato") || nivel.includes("FP Básica")) {
                        // Para Bachillerato y FPB, se unifica buscando primero la Extraordinaria (AA)
                        // Si no hay nota en AA (porque aprobó en ordinaria o no se presentó), recurre a la Ordinaria (Z o AB)
                        nota = parseFloat(row.AA) || parseFloat(row.Z) || parseFloat(row.AB);
                    } else {
                        // Para la ESO y los Programas de Diversificación Curricular, la nota Final está en Z o AB
                        nota = parseFloat(row.Z) || parseFloat(row.AB);
                    }
                } else {
                    // Evaluaciones estándar (1ª, 2ª o Extraordinaria pura si se desea)
                    nota = parseFloat(row[evalType]);
                }

                const alumnoID = `${row.E}_${row.F}_${row.G}`;

                if (!store.niveles[nivel]) store.niveles[nivel] = {};
                if (!store.niveles[nivel][unidad]) store.niveles[nivel][unidad] = {};
                if (!store.niveles[nivel][unidad][alumnoID]) store.niveles[nivel][unidad][alumnoID] = [];
                
                if (!isNaN(nota)) store.niveles[nivel][unidad][alumnoID].push(nota);
            });
            return store;
        }

        function detectarNivel(etapa, unidad) {
            // Regla prioritaria para FPB (Servicios Comerciales)
            if (unidad.includes("FPB1") || unidad.includes("SC1") || (etapa.includes("BÁSICA") && unidad.includes("1"))) return "1º FP Básica (SC)";
            if (unidad.includes("FPB2") || unidad.includes("SC2") || (etapa.includes("BÁSICA") && unidad.includes("2"))) return "2º FP Básica (SC)";
            
            // Bachillerato
            if (unidad.includes("B1") || (etapa.includes("BACHILLERATO") && unidad.includes("1"))) return "1º Bachillerato";
            if (unidad.includes("B2") || (etapa.includes("BACHILLERATO") && unidad.includes("2"))) return "2º Bachillerato";
            
            // ESO y Diversificación
            if (unidad.startsWith("1") || unidad.includes("I1")) return "1º ESO";
            if (unidad.startsWith("2") || unidad.includes("I2")) return "2º ESO";
            if (unidad.startsWith("3") || unidad.includes("I3") || unidad.includes("3P")) return "3º ESO (Incl. 1º DIV)";
            if (unidad.startsWith("4") || unidad.includes("I4") || unidad.includes("4P")) return "4º ESO (Incl. 2º DIV)";
            
            return "OTROS";
        }

        function calculateStatistics(nivelData) {
            let stats = {};
            Object.keys(nivelData).sort().forEach(grupo => {
                let c = { n0: 0, n12: 0, n34: 0, n5: 0, total: 0 };
                Object.values(nivelData[grupo]).forEach(notas => {
                    const susp = notas.filter(n => n < 5).length;
                    c.total++;
                    if (susp === 0) c.n0++;
                    else if (susp <= 2) c.n12++;
                    else if (susp <= 4) c.n34++;
                    else c.n5++;
                });
                stats[grupo] = c;
            });
            return stats;
        }

        function render(allData) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";

            NIVELES_ORDEN.forEach(nivel => {
                const tieneDatos = allData.some(d => d.niveles[nivel]);
                if (!tieneDatos) return;

                const section = document.createElement('div');
                section.className = "bg-white p-6 rounded-lg shadow border-l-4 border-blue-800";
                section.innerHTML = `<h2 class="text-xl font-bold text-blue-900 border-b pb-2 mb-4">${nivel}</h2>`;

                allData.forEach(curso => {
                    const nivelData = curso.niveles[nivel];
                    if (!nivelData) return;

                    const stats = calculateStatistics(nivelData);
                    const gLabels = [], d0 = [], d12 = [], d34 = [], d5 = [];
                    let tableRows = "";

                    Object.keys(stats).forEach(grupo => {
                        const c = stats[grupo];
                        gLabels.push(grupo);
                        d0.push((c.n0 / c.total * 100).toFixed(1));
                        d12.push((c.n12 / c.total * 100).toFixed(1));
                        d34.push((c.n34 / c.total * 100).toFixed(1));
                        d5.push((c.n5 / c.total * 100).toFixed(1));

                        tableRows += `<tr class="border-b hover:bg-gray-50 text-center">
                            <td class="p-2 border text-left font-bold text-blue-700">${grupo}</td>
                            <td class="p-2 border">${c.n0} (${(c.n0/c.total*100).toFixed(0)}%)</td>
                            <td class="p-2 border">${c.n12} (${(c.n12/c.total*100).toFixed(0)}%)</td>
                            <td class="p-2 border">${c.n34} (${(c.n34/c.total*100).toFixed(0)}%)</td>
                            <td class="p-2 border">${c.n5} (${(c.n5/c.total*100).toFixed(0)}%)</td>
                            <td class="p-2 border font-bold bg-gray-50">${c.total}</td>
                        </tr>`;
                    });

                    const canvasId = `chart-${Math.random().toString(36).substr(2, 9)}`;
                    section.innerHTML += `
                        <div class="mb-10">
                            <h3 class="font-bold text-gray-600 mb-2 uppercase text-sm">📁 Archivo / Año: ${curso.curso}</h3>
                            <div class="overflow-x-auto mb-4">
                                <table class="w-full text-xs border border-collapse">
                                    <thead class="bg-gray-100">
                                        <tr>
                                            <th class="p-2 border">Grupo</th>
                                            <th class="p-2 border">0 Susp.</th>
                                            <th class="p-2 border">1-2 Susp.</th>
                                            <th class="p-2 border">3-4 Susp.</th>
                                            <th class="p-2 border">5 o más</th>
                                            <th class="p-2 border">Total Alumnos</th>
                                        </tr>
                                    </thead>
                                    <tbody>${tableRows}</tbody>
                                </table>
                            </div>
                            <div class="h-48 w-full"><canvas id="${canvasId}"></canvas></div>
                        </div>`;
                    
                    container.appendChild(section);

                    setTimeout(() => {
                        new Chart(document.getElementById(canvasId), {
                            type: 'bar',
                            data: {
                                labels: gLabels,
                                datasets: [
                                    { label: '0 Susp', data: d0, backgroundColor: '#22c55e' },
                                    { label: '1-2 Susp', data: d12, backgroundColor: '#eab308' },
                                    { label: '3-4 Susp', data: d34, backgroundColor: '#f97316' },
                                    { label: '5+ Susp', data: d5, backgroundColor: '#ef4444' }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
                                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
                            }
                        });
                    }, 50);
                });
            });
        }

        // --- FUNCIÓN DE EXPORTACIÓN A UN EXCEL EDITABLE ---
        function exportToExcel() {
            if (globalReportData.length === 0) return;

            const wb = XLSX.utils.book_new();

            NIVELES_ORDEN.forEach(nivel => {
                let sheetRows = [];
                let tieneDatosNivel = false;

                globalReportData.forEach(curso => {
                    const nivelData = curso.niveles[nivel];
                    if (!nivelData) return;
                    
                    tieneDatosNivel = true;
                    sheetRows.push({ "Grupo": `ARCHIVO / CURSO: ${curso.curso}`, "0 Susp.": "", "1-2 Susp.": "", "3-4 Susp.": "", "5 o más": "", "Total Alumnos": "" });

                    const stats = calculateStatistics(nivelData);
                    Object.keys(stats).forEach(grupo => {
                        const c = stats[grupo];
                        sheetRows.push({
                            "Grupo": grupo,
                            "0 Susp.": `${c.n0} (${(c.n0/c.total*100).toFixed(0)}%)`,
                            "1-2 Susp.": `${c.n12} (${(c.n12/c.total*100).toFixed(0)}%)`,
                            "3-4 Susp.": `${c.n34} (${(c.n34/c.total*100).toFixed(0)}%)`,
                            "5 o más": `${c.n5} (${(c.n5/c.total*100).toFixed(0)}%)`,
                            "Total Alumnos": c.total
                        });
                    });
                    sheetRows.push({}); // Línea en blanco separadora entre años/archivos
                });

                if (tieneDatosNivel) {
                    const ws = XLSX.utils.json_to_sheet(sheetRows);
                    // Nombre de la pestaña acortado (máx 31 caracteres exigido por Excel)
                    const tabName = nivel.replace(" (Incl. 1º DIV)", "").replace(" (Incl. 2º DIV)", "");
                    XLSX.utils.book_append_sheet(wb, ws, tabName);
                }
            });

            // Descarga el archivo Excel final editable
            XLSX.writeFile(wb, "Informe_Resumen_Academico_Jefatura.xlsx");
        }
    </script>
</body>
</html>
