<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Académico - Jefatura de Estudios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-4">

    <div class="max-w-6xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-t-xl shadow-lg">
            <h1 class="text-2xl font-bold italic">Análisis de resultados</h1>
            <p class="text-sm opacity-80">Generador de informes comparativos para Jefatura</p>
        </header>

        <div class="bg-white p-6 rounded-b-xl shadow-md mb-6 border-x border-b">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3 items-end">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Evaluación</label>
                    <select id="evalSelect" class="w-full border p-2 rounded bg-gray-50 text-sm">
                        <option value="W">1ª Evaluación</option>
                        <option value="X">2ª Evaluación</option>
                        <option value="Z_AB">Ordinaria / Final (Unificada)</option>
                        <option value="AA">Extraordinaria</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Archivos Excel (Históricos)</label>
                    <input type="file" id="fileInput" accept=".xlsx, .xls" multiple class="w-full text-sm border p-1 rounded bg-white">
                </div>
                <div>
                    <button onclick="startAnalysis()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-3 rounded transition shadow-md text-sm">
                        🚀 GENERAR INFORME
                    </button>
                </div>
                <div>
                    <button id="btnExport" onclick="exportToExcel()" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-3 rounded transition shadow-md opacity-50 cursor-not-allowed text-sm">
                        📥 EXPORTAR EXCEL
                    </button>
                </div>
                <div>
                    <button id="btnExportPdf" onclick="exportToPDF()" disabled class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-3 rounded transition shadow-md opacity-50 cursor-not-allowed text-sm">
                        📄 EXPORTAR PDF
                    </button>
                </div>
            </div>
            <p id="statusMsg" class="mt-3 text-sm text-blue-600 font-medium"></p>
        </div>

        <div id="resultsContainer" class="space-y-10"></div>
    </div>

    <script>
        const NIVELES_ORDEN = [
            "1º ESO", "2º ESO", "3º ESO (Incl. 1º DIV)", "4º ESO (Incl. 2º DIV)",
            "1º Bachillerato", "2º Bachillerato",
            "1º FP Básica (SC)", "2º FP Básica (SC)"
        ];

        let globalReportData = []; 
        let activeChartsRegistry = []; 

        async function startAnalysis() {
            const fileInput = document.getElementById('fileInput');
            const evalType = document.getElementById('evalSelect').value;
            const container = document.getElementById('resultsContainer');
            const status = document.getElementById('statusMsg');
            const btnExport = document.getElementById('btnExport');
            const btnExportPdf = document.getElementById('btnExportPdf');

            if (fileInput.files.length === 0) {
                alert("Por favor, selecciona al menos un archivo Excel.");
                return;
            }

            activeChartsRegistry.forEach(chart => chart.destroy());
            activeChartsRegistry = [];

            container.innerHTML = "<p class='text-center p-10 font-bold text-gray-500'>Procesando hojas de cálculo...</p>";
            status.innerText = "Leyendo archivos...";
            
            btnExport.disabled = true;
            btnExport.classList.add('opacity-50', 'cursor-not-allowed');
            btnExportPdf.disabled = true;
            btnExportPdf.classList.add('opacity-50', 'cursor-not-allowed');

            let rawDataList = [];
            const files = fileInput.files;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    const workbook = await readExcel(file);
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, {header: "A"});
                    const processed = processData(json, evalType, file.name.split('.')[0]);
                    rawDataList.push(processed);
                } catch (err) {
                    console.error("Error leyendo archivo: " + file.name, err);
                }
            }

            rawDataList.sort((a, b) => b.curso.localeCompare(a.curso, undefined, {numeric: true, sensitivity: 'base'}));
            globalReportData = rawDataList;

            status.innerText = "Generando tablas y comparativas...";
            render(globalReportData);
            status.innerText = "Informe generado con éxito.";
            
            btnExport.disabled = false;
            btnExport.classList.remove('opacity-50', 'cursor-not-allowed');
            btnExportPdf.disabled = false;
            btnExportPdf.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function readExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}));
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function obtenerNotaValida(...celdas) {
            for (let val of celdas) {
                if (val === undefined || val === null || val === "") continue;
                const texto = String(val).trim().replace(',', '.');
                const num = parseFloat(texto);
                if (!isNaN(num)) return num;
            }
            return NaN;
        }

        function processData(rows, evalType, fileName) {
            let store = { curso: fileName, niveles: {} };

            rows.forEach((row, i) => {
                if (i < 1 || !row.N) return; 

                const unidad = String(row.N).trim().toUpperCase();
                const etapa = String(row.K || "").trim().toUpperCase();
                const nivel = detectarNivel(etapa, unidad);
                if (nivel === "OTROS") return;

                let nota = NaN;
                if (evalType === "Z_AB") {
                    if (nivel.includes("Bachillerato") || nivel.includes("FP Básica")) {
                        nota = obtenerNotaValida(row.AA, row.Z, row.AB);
                    } else {
                        nota = obtenerNotaValida(row.Z, row.AB);
                    }
                } else {
                    nota = obtenerNotaValida(row[evalType]);
                }

                const idBase = (row.E || "") + "_" + (row.F || "") + "_" + (row.G || "");
                const alumnoID = idBase === "__" ? `fila_${i}` : idBase;

                if (!store.niveles[nivel]) store.niveles[nivel] = {};
                if (!store.niveles[nivel][unidad]) store.niveles[nivel][unidad] = {};
                if (!store.niveles[nivel][unidad][alumnoID]) store.niveles[nivel][unidad][alumnoID] = [];
                
                if (!isNaN(nota)) store.niveles[nivel][unidad][alumnoID].push(nota);
            });
            return store;
        }

        function detectarNivel(etapa, unidad) {
            if (unidad.includes("FPB1") || unidad.includes("SC1") || (etapa.includes("BÁSICA") && unidad.includes("1"))) return "1º FP Básica (SC)";
            if (unidad.includes("FPB2") || unidad.includes("SC2") || (etapa.includes("BÁSICA") && unidad.includes("2"))) return "2º FP Básica (SC)";
            
            if (unidad.includes("B1") || (etapa.includes("BACHILLERATO") && unidad.includes("1"))) return "1º Bachillerato";
            if (unidad.includes("B2") || (etapa.includes("BACHILLERATO") && unidad.includes("2"))) return "2º Bachillerato";
            
            if (unidad.startsWith("1") || unidad.includes("I1")) return "1º ESO";
            if (unidad.startsWith("2") || unidad.includes("I2")) return "2º ESO";
            if (unidad.startsWith("3") || unidad.includes("I3") || unidad.includes("3P")) return "3º ESO (Incl. 1º DIV)";
            if (unidad.startsWith("4") || unidad.includes("I4") || unidad.includes("4P")) return "4º ESO (Incl. 2º DIV)";
            
            return "OTROS";
        }

        function calculateStatistics(nivelData) {
            if (!nivelData) return {};
            let stats = {};
            Object.keys(nivelData).sort().forEach(grupo => {
                let c = { n0: 0, n12: 0, n34: 0, n5: 0, total: 0 };
                const alumnos = nivelData[grupo];
                
                Object.values(alumnos).forEach(notas => {
                    const notasValidas = notas.filter(n => typeof n === 'number' && !isNaN(n));
                    if (notasValidas.length === 0) return; 

                    const susp = notasValidas.filter(n => n < 5).length;
                    c.total++;
                    if (susp === 0) c.n0++;
                    else if (susp <= 2) c.n12++;
                    else if (susp <= 4) c.n34++;
                    else c.n5++;
                });

                if (c.total > 0) stats[grupo] = c;
            });
            return stats;
        }

        function render(allData) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";

            NIVELES_ORDEN.forEach(nivel => {
                const cursosConDatos = allData.filter(d => d.niveles[nivel]);
                if (cursosConDatos.length === 0) return;

                const cursoActual = cursosConDatos[0];
                const statsActual = calculateStatistics(cursoActual.niveles[nivel]);
                const cursosAnt = cursosConDatos.slice(1);
                
                const hayHist = cursosAnt.some(c => Object.keys(calculateStatistics(c.niveles[nivel])).length > 0);
                if (Object.keys(statsActual).length === 0 && !hayHist) return;

                const section = document.createElement('div');
                section.className = "bg-white p-6 rounded-lg shadow border-l-4 border-blue-800 mb-8";
                let htmlContenido = `<h2 class="text-xl font-bold text-blue-900 border-b pb-2 mb-4">${nivel}</h2>`;

                const canvasId = `chart_${Math.random().toString(36).substring(2, 9)}`;
                const gLabels = [], d0 = [], d12 = [], d34 = [], d5 = [];

                if (Object.keys(statsActual).length > 0) {
                    let rowsAct = "";
                    Object.keys(statsActual
