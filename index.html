<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Resultados Académicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-wrapper { max-width: 700px; margin: 0 auto; position: relative; height: 350px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <div class="max-w-6xl mx-auto pt-10 px-4">
        <div class="bg-indigo-900 text-white p-8 rounded-t-2xl shadow-lg text-center">
            <h1 class="text-3xl font-extrabold mb-2 text-white">📈 Analizador de Resultados LOMLOE</h1>
            <p class="text-indigo-200">Comparativa por Grupos, Niveles e Histórico Multianual</p>
        </div>

        <div class="bg-white p-6 shadow-md grid grid-cols-1 md:grid-cols-2 gap-8 border-b">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Evaluación seleccionada</label>
                <select id="evalSel" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="W">1ª Evaluación</option>
                    <option value="X">2ª Evaluación</option>
                    <option value="FINAL">Ordinaria / Final (Col. Z / AB)</option>
                    <option value="AA">Extraordinaria (Col. AA)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Cargar archivos (Actual + 2 anteriores)</label>
                <input type="file" id="fileInput" multiple accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer"/>
            </div>
        </div>

        <div class="bg-white p-4 flex justify-center border-b rounded-b-2xl shadow-md">
            <button id="btnExport" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-8 rounded-full shadow transition-all transform hover:scale-105">
                📥 Exportar Excel Editable
            </button>
        </div>

        <div id="mainContainer" class="mt-10 space-y-16"></div>
    </div>

    <script>
        // Configuración de Secciones con palabras clave mejoradas
        const SECCIONES = [
            { id: "1ESO", nombre: "1º de ESO", keys: ["1º de e.s.o", "1º eso", "1eso"] },
            { id: "2ESO", nombre: "2º de ESO", keys: ["2º de e.s.o", "2º eso", "2eso"] },
            { id: "3ESO", nombre: "3º de ESO (Inc. Diversificación)", keys: ["3º de e.s.o", "3º eso", "3eso", "1º de div", "1º div", "diversificación i"] },
            { id: "4ESO", nombre: "4º de ESO (Inc. Diversificación)", keys: ["4º de e.s.o", "4º eso", "4eso", "2º de div", "2º div", "diversificación ii"] },
            { id: "1FPB", nombre: "1º FP Grado Básico", keys: ["1º de form", "1º f.p.b", "1º fpb", "1 fpb"] },
            { id: "2FPB", nombre: "2º FP Grado Básico", keys: ["2º de form", "2º f.p.b", "2º fpb", "2 fpb"] },
            { id: "1BACH", nombre: "1º de Bachillerato", keys: ["1º de bach", "1 bach", "1º bach"] },
            { id: "2BACH", nombre: "2º de Bachillerato", keys: ["2º de bach", "2 bach", "2º bach"] }
        ];

        let datosAnuales = {};
        let activeCharts = [];

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            
            datosAnuales = {};
            const evalTipo = document.getElementById('evalSel').value;

            for (const file of files) {
                const curso = file.name.replace(/\.[^/.]+$/, "");
                const raw = await leerExcel(file);
                datosAnuales[curso] = analizarDatos(raw, evalTipo);
            }
            renderizar();
        });

        function leerExcel(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = e => {
                    const wb = XLSX.read(e.target.result, {type: 'binary'});
                    res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 'A'}));
                };
                reader.readAsBinaryString(file);
            });
        }

        function analizarDatos(rows, evalTipo) {
            const alumnos = {};
            rows.forEach((r, i) => {
                if (i < 1 || !r.E) return;
                const id = `${r.E}_${r.F}_${r.G}`;
                let notaRaw = (evalTipo === 'FINAL') ? (r.AB || r.Z) : r[evalTipo];
                let nota = parseFloat(String(notaRaw).replace(',', '.'));

                if (!alumnos[id]) alumnos[id] = { grupo: r.N, etapa: String(r.K).toLowerCase(), suspensos: 0 };
                if (!isNaN(nota) && nota < 5) alumnos[id].suspensos++;
            });

            const res = {};
            SECCIONES.forEach(s => res[s.id] = { nombre: s.nombre, grupos: {}, total: {r0:0, r12:0, r34:0, r5p:0, t:0} });

            Object.values(alumnos).forEach(a => {
                const sec = SECCIONES.find(s => s.keys.some(k => a.etapa.includes(k)));
                if (sec) {
                    const sData = res[sec.id];
                    if (!sData.grupos[a.grupo]) sData.grupos[a.grupo] = {r0:0, r12:0, r34:0, r5p:0, t:0};
                    const cat = a.suspensos === 0 ? 'r0' : a.suspensos <= 2 ? 'r12' : a.suspensos <= 4 ? 'r34' : 'r5p';
                    sData.grupos[a.grupo][cat]++; sData.grupos[a.grupo].t++;
                    sData.total[cat]++; sData.total.t++;
                }
            });
            return res;
        }

        function renderizar() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "";
            activeCharts.forEach(c => c.destroy());
            
            const cursos = Object.keys(datosAnuales).sort().reverse();
            const cursoActual = cursos[0];

            SECCIONES.forEach(sec => {
                const dActual = datosAnuales[cursoActual][sec.id];
                if (dActual.total.t === 0) return;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100";
                
                let html = `
                    <div class="bg-indigo-50 px-8 py-4 border-b border-indigo-1
